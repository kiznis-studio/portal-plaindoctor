services:
  portal-plaindoctor:
    image: ghcr.io/kiznis-studio/portal-plaindoctor:latest
    container_name: portal-plaindoctor
    restart: unless-stopped
    volumes:
      - /opt/portals/data/sqlite/plaindoctor.db:/data/portal.db
    environment:
      - DATABASE_PATH=/data/portal.db
      - HOST=0.0.0.0
      - PORT=4321
      - CACHE_ENTRIES=50000
      - WORKERS=2
      - WORKERS_MAX=3
      - MGMT_PORT=4322
      - MAX_BOT_CONCURRENT=15
    networks:
      - portals
    mem_limit: 2048m
    cpus: 1.0

networks:
  portals:
    external: true
    name: portals-net
